  {
    id: "match-worn-guide",
    tag: "Guide",
    title: "What Is a Match Worn Football Shirt?",
    excerpt: "The term gets used across the collecting world, but what does it actually mean? And how does it differ from a match issued shirt? A complete guide.",
    date: "June 2026",
    readTime: "5 min read",
    image: "https://res.cloudinary.com/dinpfdojh/image/upload/v1782671925/WhatsApp_Image_2026-06-28_at_20.36.59_j4ezzn.jpg",
    orientation: "portrait",
    body: "<h2>Match Worn vs Match Issued</h2><p>In the world of football shirt collecting, few terms cause more confusion than <strong>match worn</strong> and <strong>match issued</strong>. They sound similar, but the distinction is significant in terms of authenticity, rarity and value.</p><p>A <em>match worn</em> shirt is exactly what it says: a shirt physically worn by a player during an official match. These shirts often carry visible signs of use including fabric wear and the natural aging that comes from real game time. That is precisely what makes them valuable. They were part of the game.</p><p>A <em>match issued</em> shirt was prepared and assigned to a player with their number but was never actually worn during the match itself. Perhaps the player was substituted before kick-off, or wore a different shirt on the day. Match issued shirts are still rare and desirable, but they typically command a lower price than a true match worn equivalent.</p><h2>How to Verify a Match Worn Shirt</h2><p>Verification is the most important and most difficult part of collecting match worn shirts. Here is what serious collectors look for:</p><ul><li><strong>Original number printing</strong> — heat-pressed or embroidered numbers applied directly for the player, not generic retail additions</li><li><strong>Player-specific sizing</strong> — match shirts are often cut to the individual player, making them longer, wider or shorter than the standard retail version</li><li><strong>Authentic wear patterns</strong> — genuine match worn shirts show subtle signs of real use that are difficult to replicate convincingly</li><li><strong>Provenance and documentation</strong> — the strongest pieces come with supporting evidence: photographs from the match, certificates of authenticity, or a documented shirt swap history</li></ul><h2>Why Collectors Value Them</h2><p>There is something irreplaceable about owning a shirt that was worn in a real match. Unlike a replica or a player edition purchased in a store, a match worn shirt has a direct physical connection to a specific moment in football history. It was on the pitch during a Champions League night, a World Cup qualifier or a title-winning match. No reproduction can offer that.</p><p>At Shirt Societe, every match worn shirt in our collection comes with full transparency regarding its provenance. We only sell what we can stand behind, and we never overstate condition or authenticity.</p><blockquote>Every shirt tells a story. Our job is to make sure that story is true.</blockquote><h2>What Do They Cost?</h2><p>Prices vary enormously and depend on the player, the match, the era and the condition of the shirt. Most match worn shirts sell for several hundred to several thousand euros, though the range is wide. A shirt from a well-known player in a significant match will naturally command a premium over a piece from a lower-profile occasion. At Shirt Societe, we focus on pieces with genuine historical significance and price them fairly for serious collectors.</p>"
  },
  {
    id: "vintage-fussballborse",
    tag: "Events",
    title: "Vintage Fussballborse: A Guide to the Fair",
    excerpt: "Germany's leading vintage football fair brings together over 1,000 collectors from across Europe at every edition. Here is everything you need to know.",
    date: "June 2026",
    readTime: "4 min read",
    image: "https://res.cloudinary.com/dinpfdojh/image/upload/v1782647123/WhatsApp_Image_2026-06-28_at_13.39.48_1_iqseqd.jpg",
    orientation: "portrait",
    body: "<h2>The Leading Vintage Football Fair in Europe</h2><p>If you collect vintage football shirts anywhere in Europe, you will have heard of <strong>Vintage Fussballborse</strong>. Founded and organised by Sebastian, it has grown from a small collector gathering into one of the most respected events on the European football memorabilia calendar.</p><p>The fair is held multiple times a year across major German cities including Hamburg, Cologne, Frankfurt and Leipzig. Each edition consistently attracts <strong>over 1,000 collectors</strong> from Germany, the Netherlands, Belgium, the United Kingdom and beyond. The range of shirts, the quality of the exhibitors and the atmosphere make it unlike any other event in the collecting world.</p><h2>What to Expect</h2><p>Walking into a Vintage Fussballborse is a genuine experience for any collector. Part market, part archive, part social gathering. You will find:</p><ul><li>Dozens of exhibitors ranging from private collectors to established dealers</li><li>Shirts spanning every era from 1970s originals to early 2000s rarities</li><li>Match worn and match issued pieces with proper documentation</li><li>Prices covering every budget, from accessible vintage finds to serious collector pieces</li><li>Conversations with knowledgeable people who share the same passion for the game and its history</li></ul><h2>Shirt Societe at the Fair</h2><p>Shirt Societe has been a regular exhibitor at Vintage Fussballborse since 2025, attending editions in Hamburg, Cologne and Dusseldorf. We will be at <strong>Frankfurt on July 4th, 2026</strong>. If you are attending, come and find our stand.</p><blockquote>Come and say hello. We would love to meet fellow collectors.</blockquote><p>Follow the fair on Instagram at <strong>@vintagefussball</strong> for updates on upcoming dates and locations.</p>"
  },
  {
    id: "how-to-collect",
    tag: "Guide",
    title: "How to Start Collecting Vintage Football Shirts",
    excerpt: "Thinking about getting into vintage shirt collecting? Here is how to start smart, avoid the common mistakes, and build a collection that lasts.",
    date: "June 2026",
    readTime: "6 min read",
    image: "https://res.cloudinary.com/dinpfdojh/image/upload/v1782464482/WhatsApp_Image_2026-06-26_at_11.00.05_1_qigdxz.jpg",
    orientation: "landscape",
    body: "<h2>Why Vintage Football Shirts?</h2><p>Vintage football shirts occupy a unique position in collecting. They sit at the intersection of sport, fashion, design history and personal memory. Unlike many collectibles, they are wearable. A 1994 AC Milan shirt is not simply an artifact behind glass. It is something you can put on, and when you do, you carry something of the game with you.</p><p>The market for vintage shirts has grown significantly over the past decade, driven largely by a generation of collectors who grew up watching the golden era of European club football in the 1990s. Despite this growth, prices have not yet reached the levels seen in, for example, vintage trainers or trading cards. There is still genuine value to be found by collectors who know what they are looking at.</p><h2>Start Smart</h2><p>The most common mistake among new collectors is buying too broadly and too quickly. A focused approach will serve you better. Some principles to guide you from the start:</p><ul><li><strong>Collect what genuinely interests you</strong> — shirts connected to clubs, national teams or eras you care about. Passion makes the research feel natural rather than like work.</li><li><strong>Study before you spend significantly</strong> — spend time on collector forums, Instagram accounts and communities such as Reddit before committing serious money.</li><li><strong>Condition is everything</strong> — a shirt in excellent condition is almost always more valuable than a rarer shirt in poor condition. Do not overlook this.</li><li><strong>Learn to authenticate</strong> — reproductions and fakes are common across every era. Develop an eye for the original before buying anything at a higher price point.</li></ul><h2>Where to Find Shirts</h2><ul><li><strong>Vintage fairs</strong> such as Vintage Fussballborse — inspect pieces in person and speak directly with sellers who know the history of what they are offering</li><li><strong>Curated shops</strong> such as Shirt Societe — the research and verification is done for you, and the selection is intentional rather than arbitrary</li><li><strong>Platforms such as Vinted and eBay</strong> — higher risk, but occasionally excellent finds at accessible prices for the patient buyer</li><li><strong>Instagram</strong> — the most active and immediate community for buying, selling, trading and learning</li></ul><h2>Build Around a Theme</h2><p>The collections that tend to hold and grow in value are those built with intention. A clear theme gives your collection coherence and makes individual pieces more meaningful in context. Consider collecting all shirts from a specific club across different decades, national team shirts from a single World Cup or European Championship year, shirts connected to a particular player across their career, or a defined era such as 1988 to 1998.</p><p>At Shirt Societe we are always happy to help collectors think through a direction or source specific pieces. Reach out on Instagram or by email.</p>"
  },
  {
    id: "frankfurt-2026",
    tag: "Events",
    title: "Frankfurt: What Shirt Societe Is Bringing",
    excerpt: "Vintage Fussballborse Frankfurt takes place on July 4th, 2026. A preview of the shirts we are bringing and what to expect on the day.",
    date: "June 2026",
    readTime: "3 min read",
    image: "https://res.cloudinary.com/dinpfdojh/image/upload/v1782464482/WhatsApp_Image_2026-06-26_at_11.00.04_qxxfzx.jpg",
    orientation: "portrait",
    body: "<h2>Frankfurt, 4 July 2026</h2><p>Vintage Fussballborse Frankfurt takes place on <strong>Saturday, July 4th 2026, from 10:00 to 17:00</strong>. Frankfurt is one of the stronger editions of the fair each year. The crowd is knowledgeable, the atmosphere is good, and it consistently brings out serious collectors from across Germany and neighbouring countries.</p><p>Shirt Societe will be there with a carefully selected range of shirts. We have spent the weeks leading up to the fair putting together a collection across different categories and price points, with something for collectors at every level.</p><h2>What We Are Bringing</h2><ul><li><strong>Match worn shirts</strong> — verified pieces with clear provenance, priced to reflect their history and condition honestly</li><li><strong>1990s club classics</strong> — shirts from the era that shaped the visual identity of European club football</li><li><strong>German club shirts</strong> — always in strong demand at German fairs, and we have some good pieces this time</li><li><strong>National team shirts</strong> — select pieces from major tournaments</li><li><strong>Accessible vintage finds</strong> — well-priced shirts for collectors who are building their collection or looking for a starting point</li></ul><h2>Come and Find Us</h2><p>The best thing about a fair like this is the conversation as much as the shirts themselves. If you are coming to Frankfurt on July 4th, come and find our stand. Whether you are looking for something specific, want a second opinion on a piece, or just want to talk football shirts, we are there for it.</p><p>Follow <strong>@shirtsociete</strong> on Instagram for live coverage from the fair on the day.</p><blockquote>Frankfurt. July 4th. 10:00 to 17:00. We will see you there.</blockquote>"
  }
];

function renderPosts() {
  var grid = document.getElementById("posts-grid");
  var html = "";
  for (var i = 0; i < POSTS.length; i++) {
    var p = POSTS[i];
    var orientation = p.orientation || "landscape";
    html += "<div class="post-card" onclick="showPost('" + p.id + "')">";
    html += "<div class="post-img-wrap " + orientation + ""><img src="" + p.image + "" alt="" + p.title + "" loading="lazy"></div>";
    html += "<div class="post-tag">" + p.tag + "</div>";
    html += "<div class="post-title">" + p.title + "</div>";
    html += "<div class="post-excerpt">" + p.excerpt + "</div>";
    html += "<div class="post-meta">" + p.date + " &middot; " + p.readTime + "</div>";
    html += "<div class="read-more">Read more &rarr;</div>";
    html += "</div>";
  }
  grid.innerHTML = html;
}

function showPost(id) {
  var post = null;
  for (var i = 0; i < POSTS.length; i++) {
    if (POSTS[i].id === id) { post = POSTS[i]; break; }
  }
  if (!post) return;
  var orientation = post.orientation || "landscape";
  document.getElementById("blog-list").style.display = "none";
  document.getElementById("post-detail").classList.add("active");
  document.getElementById("post-content").innerHTML =
    "<div class="eyebrow">" + post.tag + "</div>" +
    "<h1 class="detail-title">" + post.title + "</h1>" +
    "<div class="detail-meta">" + post.date + " &middot; Shirt Societe &middot; " + post.readTime + "</div>" +
    "<div class="detail-img-wrap " + orientation + ""><img src="" + post.image + "" alt="" + post.title + ""></div>" +
    "<div class="post-body">" + post.body + "</div>";
  window.scrollTo(0, 0);
  if (history.pushState) history.pushState({post: id}, "", "/blog.html#" + id);
  if (typeof gtag !== "undefined") gtag("event", "view_item", {item_id: id, item_name: post.title});
}

function showList() {
  document.getElementById("blog-list").style.display = "block";
  document.getElementById("post-detail").classList.remove("active");
  window.scrollTo(0, 0);
  if (history.pushState) history.pushState({}, "", "/blog.html");
}

window.addEventListener("popstate", function(e) {
  if (e.state && e.state.post) showPost(e.state.post);
  else showList();
});

var hash = window.location.hash.replace("#", "");
if (hash) showPost(hash);
renderPosts();
</script>
