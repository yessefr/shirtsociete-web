<script>
var POSTS = [
  {
    id: "match-worn-guide",
    tag: "Guide",
    title: "What Is a Match Worn Football Shirt?",
    excerpt: "The term gets used everywhere in the collector world. But what does it actually mean, and how do you tell the difference from a match issued shirt?",
    date: "June 2026",
    readTime: "5 min read",
    image: "https://res.cloudinary.com/dinpfdojh/image/upload/v1782647123/WhatsApp_Image_2026-06-28_at_13.39.48_kc6nqw.jpg",
    body: "<h2>Match Worn vs Match Issued</h2><p>In the world of vintage football shirt collecting, few terms cause more confusion than <strong>match worn</strong> and <strong>match issued</strong>. The difference is significant in terms of rarity and value.</p><p>A <em>match worn</em> shirt was physically worn by a player during an official match. These shirts often show signs of use and that is precisely what makes them special. They were part of football history.</p><p>A <em>match issued</em> shirt was prepared and assigned to a player but never actually worn in the match. Match issued shirts are still rare and desirable, but they typically command a lower price.</p><h2>How to Verify a Match Worn Shirt</h2><ul><li><strong>Player number printing</strong> — original heat-pressed or embroidered numbers, not reprints</li><li><strong>Size and cut</strong> — player shirts are often cut differently than retail versions</li><li><strong>Signs of wear</strong> — authentic match worn shirts show subtle signs of use</li><li><strong>Provenance</strong> — the best shirts come with documentation or a known shirt swap history</li></ul><h2>Why Collectors Value Them</h2><p>There is something deeply personal about owning a shirt that was worn in a real match. At Shirt Societe, every match worn shirt comes with full transparency about its provenance. We only sell what we can verify.</p><blockquote>Every shirt tells a story. Our job is to make sure that story is true.</blockquote><h2>What Do They Cost?</h2><p>Match worn shirts range enormously depending on the player, the match and the era. Entry-level pieces can start from around 100 euros. Shirts from iconic players or historic matches can reach several thousand euros. At Shirt Societe, we focus on pieces with genuine historical significance at pricing serious collectors can realistically afford.</p>"
  },
  {
    id: "vintage-fussballborse",
    tag: "Events",
    title: "Vintage Fussballborse: Europe's Best Football Fair",
    excerpt: "What is Vintage Fussballborse, why do 1,000 plus collectors travel from across Europe to attend, and what can you expect at the fair?",
    date: "June 2026",
    readTime: "4 min read",
    image: "https://res.cloudinary.com/dinpfdojh/image/upload/v1782464482/WhatsApp_Image_2026-06-26_at_11.00.04_1_piofvi.jpg",
    body: "<h2>Germany's Leading Vintage Football Fair</h2><p>If you collect vintage football shirts anywhere in Europe, you have almost certainly heard of <strong>Vintage Fussballborse</strong>. Founded and organised by Sebastian, the fair has grown into one of the most respected events on the European football memorabilia calendar.</p><p>Held multiple times per year across major German cities, each edition draws <strong>over 1,000 collectors</strong> from Germany, the Netherlands, Belgium, the UK and beyond.</p><h2>What to Expect at the Fair</h2><ul><li>Dozens of exhibitors from private collectors to established dealers</li><li>Shirts from every era: 1970s originals, 1980s and 1990s classics, 2000s rarities</li><li>Match worn and match issued pieces with proper provenance</li><li>Prices from affordable vintage finds to premium collector pieces</li><li>Passionate conversations with people who share your passion</li></ul><h2>Shirt Societe at the Fairs</h2><p>Shirt Societe has been a regular exhibitor since 2025, attending fairs in Hamburg, Cologne and Dusseldorf. We will be at <strong>Frankfurt on July 4th, 2026</strong>. Come and say hello.</p><blockquote>If you are coming to Frankfurt on July 4th, come find our stand. We would love to meet fellow collectors.</blockquote><p>Follow the fair on Instagram at <strong>@vintagefussball</strong> for updates on upcoming events.</p>"
  },
  {
    id: "how-to-collect",
    tag: "Guide",
    title: "How to Start Collecting Vintage Football Shirts",
    excerpt: "Thinking about getting into vintage shirt collecting? Everything you need to know to start smart and build a collection you are proud of.",
    date: "June 2026",
    readTime: "6 min read",
    image: "https://res.cloudinary.com/dinpfdojh/image/upload/v1782647509/WhatsApp_Image_2026-06-28_at_13.50.26_oxxvhy.jpg",
    body: "<h2>Why Vintage Football Shirts?</h2><p>Vintage football shirts sit at a unique intersection of sport, fashion, art and history. They are wearable pieces of football heritage. A 1994 AC Milan shirt is not just an artifact. It is something you can actually wear.</p><p>The market has grown significantly over the past decade but prices have not yet reached the levels of vintage sneakers, meaning there is still genuine value to be found by knowledgeable buyers.</p><h2>Start Smart</h2><ul><li><strong>Collect what you love</strong> — focus on clubs, nations or eras you genuinely care about</li><li><strong>Learn before you spend</strong> — spend time on forums and Instagram first</li><li><strong>Condition matters</strong> — a shirt in excellent condition is almost always worth more</li><li><strong>Authenticity first</strong> — fakes are everywhere. Learn to spot them before spending significantly</li></ul><h2>Where to Find Shirts</h2><ul><li><strong>Vintage fairs</strong> like Vintage Fussballborse — inspect in person</li><li><strong>Curated shops</strong> like Shirt Societe — curation and authenticity done for you</li><li><strong>Vinted and eBay</strong> — higher risk, occasional great finds</li><li><strong>Instagram</strong> — the most active community for buying, selling and trading</li></ul><h2>Build a Collection with a Theme</h2><p>Collections built around a clear theme tend to appreciate most in value. Ideas: all shirts from a specific club across decades, national team shirts from a World Cup year, or shirts from a specific era such as 1990 to 1998.</p>"
  },
  {
    id: "frankfurt-2026",
    tag: "Events",
    title: "Coming to Frankfurt: What We Are Bringing",
    excerpt: "Vintage Fussballborse Frankfurt is on July 4th, 2026. A preview of what Shirt Societe will have at our stand and why you should come.",
    date: "June 2026",
    readTime: "3 min read",
    image: "https://res.cloudinary.com/dinpfdojh/image/upload/v1782464482/WhatsApp_Image_2026-06-26_at_11.00.04_qxxfzx.jpg",
    body: "<h2>Frankfurt, 4 July 2026, 10:00 to 17:00</h2><p>Vintage Fussballborse Frankfurt takes place on <strong>Saturday, July 4th 2026</strong>. It is one of the most anticipated editions of the year. Frankfurt draws a large, knowledgeable crowd and is always one of the highlights of the collector calendar.</p><h2>What We Are Bringing</h2><ul><li><strong>Match worn shirts</strong> — verified pieces with proper provenance</li><li><strong>1990s club classics</strong> — the era that defined European football aesthetics</li><li><strong>German club shirts</strong> — always in strong demand at German fairs</li><li><strong>National team pieces</strong> — including rare finds from major tournaments</li><li><strong>Affordable vintage finds</strong> — great shirts for collectors at every level</li></ul><h2>Come and Say Hello</h2><p>One of the things we love most about Vintage Fussballborse is the conversations. Whether you are looking for something specific, want advice on building your collection, or simply want to talk football and shirts, find us at our stand.</p><p>Follow <strong>@shirtsociete</strong> on Instagram for live updates from the fair on the day.</p><blockquote>Frankfurt. July 4th. 10:00 to 17:00. We will see you there.</blockquote>"
  }
];

function renderPosts() {
  var grid = document.getElementById("posts-grid");
  grid.innerHTML = POSTS.map(function(p) {
    return "<div class=\"post-card\" onclick=\"showPost('" + p.id + "')\">" +
      (p.image ? "<img src=\"" + p.image + "\" class=\"post-img\" alt=\"" + p.title + "\" loading=\"lazy\">" : "") +
      "<div class=\"post-tag\">" + p.tag + "</div>" +
      "<div class=\"post-title\">" + p.title + "</div>" +
      "<div class=\"post-excerpt\">" + p.excerpt + "</div>" +
      "<div class=\"post-meta\">" + p.date + " &middot; " + p.readTime + "</div>" +
      "<div class=\"read-more\">Read more &rarr;</div>" +
    "</div>";
  }).join("");
}

function showPost(id) {
  var post = null;
  for (var i = 0; i < POSTS.length; i++) {
    if (POSTS[i].id === id) { post = POSTS[i]; break; }
  }
  if (!post) return;
  document.getElementById("blog-list").style.display = "none";
  document.getElementById("post-detail").classList.add("active");
  document.getElementById("post-content").innerHTML =
    "<div class=\"eyebrow\">" + post.tag + "</div>" +
    "<h1 class=\"detail-title\">" + post.title + "</h1>" +
    "<div class=\"detail-meta\">" + post.date + " &middot; Shirt Societe &middot; " + post.readTime + "</div>" +
    (post.image ? "<img src=\"" + post.image + "\" class=\"detail-img\" alt=\"" + post.title + "\">" : "") +
    "<div class=\"post-body\">" + post.body + "</div>";
  window.scrollTo(0, 0);
  if (history.pushState) history.pushState({post: id}, "", "/blog.html#" + id);
  if (typeof gtag !== "undefined") gtag("event", "view_item", {item_id: id, item_name: post.title});
}

function showList() {
  document.getElementById("blog-list").style.display = "block";
  document.getElementById("post-detail").classList.remove("active");
  window.scrollTo(0, 0);
  if (history.pushState) history.pushState({}, "", "/blog.html");
}

window.addEventListener("popstate", function(e) {
  if (e.state && e.state.post) showPost(e.state.post);
  else showList();
});

var hash = window.location.hash.replace("#", "");
if (hash) { showPost(hash); } else { renderPosts(); }
if (!hash) renderPosts();
</script>
